<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link href="style.css" rel="stylesheet">
    <script defer src="script.js"></script>
    <title>Task List</title>
</head>
<body class="body">
    <div class="body__title">Lista zadań</div>
<div class="container">
        <div class="container__content">
            <div class="container__title">
                Dodaj nowe zadanie
            </div>
            <form class="js-form container__form">
                <input class="js-newTask form__input" placeholder="Co jest do zrobienia?">
                <button class="container__button">Dodaj zadanie</button>
            </form>
        </div>
    
        <div class="container__content">
        <div class="container__title">Lista zadań</div>
        <ul class="js-tasks"></ul>
        </div>
    
</div>

</html>
